<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>导入 Apple Health 数据</title>
  <style>
    :root {
      --bg: #faf8f5;
      --bg2: #f0ece6;
      --surface: #ffffff;
      --ink: #2d2a26;
      --muted: #8a8580;
      --rule: #e5e0d8;
      --accent: #c4856c;
      --accent2: #7a9e7e;
      --accent3: #6b8fb5;
      --danger: #c46b6b;
      --warning: #d4a55a;
      --radius: 12px;
      --shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      color: var(--ink);
      background: var(--bg);
      line-height: 1.6;
      padding: 0;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
    }

    .header {
      padding: 20px 16px;
      text-align: center;
      border-bottom: 1px solid var(--rule);
      background: var(--surface);
    }
    .header h1 {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--ink);
    }
    .header p {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .container {
      padding: 16px;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }
    .card-title {
      font-size: 0.92rem;
      font-weight: 600;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--rule);
    }

    .upload-area {
      border: 2px dashed var(--rule);
      border-radius: var(--radius);
      padding: 32px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--bg2);
    }
    .upload-area:hover {
      border-color: var(--accent);
      background: #fdf5f0;
    }
    .upload-area.has-file {
      border-color: var(--accent2);
      background: #f0f7f1;
      border-style: solid;
    }
    .upload-icon {
      font-size: 2.5rem;
      margin-bottom: 8px;
    }
    .upload-text {
      font-size: 0.9rem;
      color: var(--muted);
    }
    .upload-filename {
      font-size: 0.82rem;
      color: var(--accent);
      margin-top: 6px;
      font-weight: 500;
    }

    .file-input {
      display: none;
    }

    .help-text {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 10px;
      line-height: 1.6;
    }
    .help-text code {
      background: var(--bg2);
      padding: 1px 4px;
      border-radius: 4px;
      font-size: 0.75rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .stat-item {
      text-align: center;
      padding: 12px 4px;
      border-radius: 8px;
      background: var(--bg2);
    }
    .stat-icon {
      font-size: 1.4rem;
      margin-bottom: 4px;
    }
    .stat-count {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--ink);
    }
    .stat-label {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .preview-list {
      max-height: 360px;
      overflow-y: auto;
    }
    .preview-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 8px 0;
      border-bottom: 1px solid var(--rule);
      font-size: 0.82rem;
    }
    .preview-item:last-child {
      border-bottom: none;
    }
    .preview-icon {
      font-size: 1.1rem;
      flex-shrink: 0;
      width: 28px;
      text-align: center;
    }
    .preview-date {
      font-weight: 600;
      color: var(--muted);
      font-size: 0.78rem;
    }
    .preview-content {
      flex: 1;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .btn:active {
      transform: scale(0.98);
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover {
      background: #b37a62;
    }
    .btn-primary:disabled {
      background: var(--rule);
      color: var(--muted);
      cursor: not-allowed;
      transform: none;
    }

    .message {
      padding: 14px 16px;
      border-radius: var(--radius);
      font-size: 0.88rem;
      margin-bottom: 16px;
      display: none;
    }
    .message.success {
      display: block;
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }
    .message.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }
    .message a {
      color: inherit;
      font-weight: 600;
      text-decoration: underline;
    }

    .hidden {
      display: none !important;
    }

    .empty-state {
      text-align: center;
      padding: 24px;
      color: var(--muted);
    }
    .empty-icon {
      font-size: 2rem;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>导入 Apple Health 数据</h1>
    <p>从 iPhone 健康 app 导出的 XML 文件导入睡眠记录</p>
  </div>

  <div class="container">
    <!-- Upload -->
    <div class="card">
      <div class="card-title">选择文件</div>
      <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">📁</div>
        <div class="upload-text">点击选择 export.xml</div>
        <div class="upload-filename" id="fileName"></div>
      </div>
      <input type="file" class="file-input" id="fileInput" accept=".xml" onchange="handleFile(event)">
      <div class="help-text">
        导出方法：iPhone 健康 app → 右上角头像 → 导出所有健康数据 → 解压 export.zip → 选择其中的 <code>apple_health_export/export.xml</code>
      </div>
    </div>

    <!-- Stats -->
    <div class="card hidden" id="statsCard">
      <div class="card-title">导入统计</div>
      <div class="stats">
        <div class="stat-item">
          <div class="stat-icon">😴</div>
          <div class="stat-count" id="countSleep">0</div>
          <div class="stat-label">睡眠记录</div>
        </div>
        <div class="stat-item">
          <div class="stat-icon">📅</div>
          <div class="stat-count" id="countDays">0</div>
          <div class="stat-label">天数</div>
        </div>
        <div class="stat-item">
          <div class="stat-icon">⏱️</div>
          <div class="stat-count" id="countHours">0</div>
          <div class="stat-label">总小时</div>
        </div>
      </div>
      <div style="text-align:right;font-size:0.78rem;color:var(--muted);margin-top:10px" id="totalCount"></div>
    </div>

    <!-- Preview -->
    <div class="card hidden" id="previewCard">
      <div class="card-title">预览 (前30条)</div>
      <div class="preview-list" id="previewList"></div>
    </div>

    <!-- Import Button -->
    <button class="btn btn-primary hidden" id="importBtn" onclick="doImport()">导入到本地</button>

    <!-- Message -->
    <div class="message" id="message"></div>
  </div>

  <script>
    var convertedRecords = [];

    function handleFile(event) {
      var file = event.target.files[0];
      if (!file) return;

      var area = document.getElementById('uploadArea');
      document.getElementById('fileName').textContent = file.name;
      area.classList.add('has-file');
      document.getElementById('message').className = 'message';
      document.getElementById('message').textContent = '';

      var reader = new FileReader();
      reader.onload = function(e) {
        try {
          processAppleHealthXML(e.target.result);
        } catch (err) {
          showMessage('error', '解析文件失败：' + err.message);
        }
      };
      reader.readAsText(file);
    }

    function processAppleHealthXML(xmlText) {
      convertedRecords = [];

      var parser = new DOMParser();
      var doc = parser.parseFromString(xmlText, 'text/xml');
      var records = doc.querySelectorAll('Record[type="HKCategoryTypeIdentifierSleepAnalysis"]');

      if (records.length === 0) {
        showMessage('error', '未找到睡眠数据。请确认文件是 Apple Health 导出的 export.xml，且包含睡眠记录。');
        return;
      }

      // Group sleep records by date
      var sleepByDate = {};

      records.forEach(function(record) {
        var value = record.getAttribute('value');
        // Only import actual sleep (not "in bed" or awake)
        if (value !== 'HKCategoryValueSleepAnalysisAsleep' &&
            value !== 'HKCategoryValueSleepAnalysisAsleepCore' &&
            value !== 'HKCategoryValueSleepAnalysisAsleepDeep' &&
            value !== 'HKCategoryValueSleepAnalysisAsleepREM') {
          return;
        }

        var startDateStr = record.getAttribute('startDate');
        var endDateStr = record.getAttribute('endDate');
        if (!startDateStr || !endDateStr) return;

        var start = parseAppleHealthDate(startDateStr);
        var end = parseAppleHealthDate(endDateStr);
        if (!start || !end) return;

        var dateKey = formatDate(start);
        if (!sleepByDate[dateKey]) {
          sleepByDate[dateKey] = [];
        }
        sleepByDate[dateKey].push({ start: start, end: end });
      });

      // Convert to app format: merge sleep periods per day
      Object.keys(sleepByDate).sort().forEach(function(dateStr) {
        var periods = sleepByDate[dateStr];
        // Sort by start time
        periods.sort(function(a, b) { return a.start - b.start; });

        // Find bedtime (earliest start) and waketime (latest end)
        var bedtime = periods[0].start;
        var waketime = periods[periods.length - 1].end;

        // Calculate total sleep duration in hours
        var totalMinutes = 0;
        periods.forEach(function(p) {
          totalMinutes += (p.end - p.start) / 60000;
        });

        var duration = totalMinutes / 60;

        // Format times
        var bedTimeStr = formatTime(bedtime);
        var wakeTimeStr = formatTime(waketime);

        convertedRecords.push({
          id: Date.now() + Math.random() * 10000,
          type: 'sleep',
          date: dateStr,
          time: bedTimeStr,
          bedtime: bedTimeStr,
          waketime: wakeTimeStr,
          duration: duration,
          rating: 0,
          note: '从 Apple Health 导入 (' + periods.length + ' 段睡眠)',
          createdAt: Date.now()
        });
      });

      // Show stats
      var totalHours = convertedRecords.reduce(function(sum, r) { return sum + r.duration; }, 0);
      document.getElementById('countSleep').textContent = convertedRecords.length;
      document.getElementById('countDays').textContent = convertedRecords.length;
      document.getElementById('countHours').textContent = totalHours.toFixed(1);
      document.getElementById('totalCount').textContent = '共 ' + convertedRecords.length + ' 天睡眠记录，总计 ' + totalHours.toFixed(1) + ' 小时';
      document.getElementById('statsCard').classList.remove('hidden');

      // Show preview
      var previewHtml = '';
      var previewItems = convertedRecords.slice(-30).reverse(); // show latest first
      if (previewItems.length === 0) {
        previewHtml = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">没有可导入的记录</div></div>';
      } else {
        previewItems.forEach(function(r) {
          var parts = r.date.split('-');
          var dateLabel = parseInt(parts[1]) + '月' + parseInt(parts[2]) + '日';
          previewHtml += '<div class="preview-item">';
          previewHtml += '<div class="preview-icon">😴</div>';
          previewHtml += '<div class="preview-content">';
          previewHtml += '<div class="preview-date">' + dateLabel + '</div>';
          previewHtml += '<div>' + r.bedtime + ' ~ ' + r.waketime + ' | ' + r.duration.toFixed(1) + '小时</div>';
          previewHtml += '</div></div>';
        });
      }
      document.getElementById('previewList').innerHTML = previewHtml;
      document.getElementById('previewCard').classList.remove('hidden');

      if (convertedRecords.length > 0) {
        document.getElementById('importBtn').classList.remove('hidden');
      } else {
        document.getElementById('importBtn').classList.add('hidden');
      }
    }

    function parseAppleHealthDate(str) {
      // Format: "2024-01-15 23:00:00 +0800"
      try {
        var match = str.match(/(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2}):(\d{2})\s+([+-]\d{4})/);
        if (!match) return null;
        var tz = match[7];
        var tzHour = parseInt(tz.substring(0, 3));
        var tzMin = parseInt(tz.substring(0, 1) + tz.substring(3, 5));
        var offset = (tzHour * 60 + tzMin) * 60000;
        var utc = Date.UTC(parseInt(match[1]), parseInt(match[2]) - 1, parseInt(match[3]),
                           parseInt(match[4]), parseInt(match[5]), parseInt(match[6]));
        return new Date(utc - offset);
      } catch (e) {
        return null;
      }
    }

    function formatDate(d) {
      var y = d.getFullYear();
      var m = String(d.getMonth() + 1).padStart(2, '0');
      var day = String(d.getDate()).padStart(2, '0');
      return y + '-' + m + '-' + day;
    }

    function formatTime(d) {
      var h = String(d.getHours()).padStart(2, '0');
      var m = String(d.getMinutes()).padStart(2, '0');
      return h + ':' + m;
    }

    function doImport() {
      if (convertedRecords.length === 0) {
        showMessage('error', '没有可导入的记录');
        return;
      }

      var existing = {};
      try {
        var raw = localStorage.getItem('health_manager');
        if (raw) existing = JSON.parse(raw);
      } catch (e) {}

      if (!existing.records) existing.records = [];
      if (!existing.nextId) existing.nextId = 1;

      var maxId = existing.nextId;
      existing.records.forEach(function(r) {
        if (r.id >= maxId) maxId = r.id + 1;
      });

      var importCount = 0;
      convertedRecords.forEach(function(r) {
        var dup = existing.records.some(function(er) {
          return er.date === r.date && er.type === 'sleep';
        });
        if (!dup) {
          r.id = maxId++;
          r.createdAt = Date.now();
          existing.records.push(r);
          importCount++;
        }
      });

      existing.nextId = maxId;

      try {
        localStorage.setItem('health_manager', JSON.stringify(existing));
        showMessage('success',
          '导入成功！共导入 ' + importCount + ' 天睡眠记录。<br><br>' +
          '<a href="wardrobe-manager.html">返回主应用</a>'
        );
        document.getElementById('importBtn').disabled = true;
      } catch (err) {
        showMessage('error', '保存失败：' + err.message);
      }
    }

    function showMessage(type, text) {
      var el = document.getElementById('message');
      el.className = 'message ' + type;
      el.innerHTML = text;
    }
  </script>

</body>
</html>

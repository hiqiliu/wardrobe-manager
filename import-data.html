<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>数据导入 - 健康记录</title>
  <style>
    :root {
      --bg: #faf8f5;
      --bg2: #f0ece6;
      --surface: #ffffff;
      --ink: #2d2a26;
      --muted: #8a8580;
      --rule: #e5e0d8;
      --accent: #c4856c;
      --accent2: #7a9e7e;
      --accent3: #6b8fb5;
      --danger: #c46b6b;
      --warning: #d4a55a;
      --radius: 12px;
      --shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      color: var(--ink);
      background: var(--bg);
      line-height: 1.6;
      padding: 0;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
    }

    .header {
      padding: 20px 16px;
      text-align: center;
      border-bottom: 1px solid var(--rule);
      background: var(--surface);
    }
    .header h1 {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--ink);
    }
    .header p {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .container {
      padding: 16px;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }
    .card-title {
      font-size: 0.92rem;
      font-weight: 600;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--rule);
    }

    .upload-area {
      border: 2px dashed var(--rule);
      border-radius: var(--radius);
      padding: 32px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--bg2);
    }
    .upload-area:hover {
      border-color: var(--accent);
      background: #fdf5f0;
    }
    .upload-area.has-file {
      border-color: var(--accent2);
      background: #f0f7f1;
      border-style: solid;
    }
    .upload-icon {
      font-size: 2.5rem;
      margin-bottom: 8px;
    }
    .upload-text {
      font-size: 0.9rem;
      color: var(--muted);
    }
    .upload-filename {
      font-size: 0.82rem;
      color: var(--accent);
      margin-top: 6px;
      font-weight: 500;
    }

    .file-input {
      display: none;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .stat-item {
      text-align: center;
      padding: 12px 4px;
      border-radius: 8px;
      background: var(--bg2);
    }
    .stat-icon {
      font-size: 1.4rem;
      margin-bottom: 4px;
    }
    .stat-count {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--ink);
    }
    .stat-label {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .preview-list {
      max-height: 360px;
      overflow-y: auto;
    }
    .preview-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 8px 0;
      border-bottom: 1px solid var(--rule);
      font-size: 0.82rem;
    }
    .preview-item:last-child {
      border-bottom: none;
    }
    .preview-icon {
      font-size: 1.1rem;
      flex-shrink: 0;
      width: 28px;
      text-align: center;
    }
    .preview-date {
      font-weight: 600;
      color: var(--muted);
      font-size: 0.78rem;
    }
    .preview-content {
      flex: 1;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .btn:active {
      transform: scale(0.98);
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover {
      background: #b37a62;
    }
    .btn-primary:disabled {
      background: var(--rule);
      color: var(--muted);
      cursor: not-allowed;
      transform: none;
    }

    .message {
      padding: 14px 16px;
      border-radius: var(--radius);
      font-size: 0.88rem;
      margin-bottom: 16px;
      display: none;
    }
    .message.success {
      display: block;
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }
    .message.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }
    .message a {
      color: inherit;
      font-weight: 600;
      text-decoration: underline;
    }

    .hidden {
      display: none !important;
    }

    .empty-state {
      text-align: center;
      padding: 24px;
      color: var(--muted);
    }
    .empty-icon {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 500;
      margin-left: 6px;
    }
    .badge-meal { background: #fef3c7; color: #92400e; }
    .badge-sleep { background: #ede9fe; color: #5b21b6; }
    .badge-bowel { background: #d1fae5; color: #065f46; }
    .badge-water { background: #dbeafe; color: #1e40af; }
    .badge-skip { background: var(--bg2); color: var(--muted); text-decoration: line-through; }
  </style>
</head>
<body>

  <div class="header">
    <h1>数据导入</h1>
    <p>从备份文件导入健康记录到本地存储</p>
  </div>

  <div class="container">
    <!-- Upload -->
    <div class="card">
      <div class="card-title">选择备份文件</div>
      <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">📁</div>
        <div class="upload-text">点击选择 JSON 备份文件</div>
        <div class="upload-filename" id="fileName"></div>
      </div>
      <input type="file" class="file-input" id="fileInput" accept=".json,application/json" onchange="handleFile(event)">
    </div>

    <!-- Stats -->
    <div class="card hidden" id="statsCard">
      <div class="card-title">导入统计</div>
      <div class="stats">
        <div class="stat-item">
          <div class="stat-icon">🍽️</div>
          <div class="stat-count" id="countMeal">0</div>
          <div class="stat-label">饮食</div>
        </div>
        <div class="stat-item">
          <div class="stat-icon">💧</div>
          <div class="stat-count" id="countWater">0</div>
          <div class="stat-label">饮水</div>
        </div>
        <div class="stat-item">
          <div class="stat-icon">🚽</div>
          <div class="stat-count" id="countBowel">0</div>
          <div class="stat-label">排泄</div>
        </div>
        <div class="stat-item">
          <div class="stat-icon">😴</div>
          <div class="stat-count" id="countSleep">0</div>
          <div class="stat-label">睡眠</div>
        </div>
      </div>
      <div style="text-align:right;font-size:0.78rem;color:var(--muted);margin-top:10px" id="totalCount"></div>
    </div>

    <!-- Preview -->
    <div class="card hidden" id="previewCard">
      <div class="card-title">预览 (前50条)</div>
      <div class="preview-list" id="previewList"></div>
    </div>

    <!-- Import Button -->
    <button class="btn btn-primary hidden" id="importBtn" onclick="doImport()">导入到本地</button>

    <!-- Message -->
    <div class="message" id="message"></div>
  </div>

  <script>
    var convertedRecords = [];
    var skippedCount = 0;

    function handleFile(event) {
      var file = event.target.files[0];
      if (!file) return;

      var area = document.getElementById('uploadArea');
      document.getElementById('fileName').textContent = file.name;
      area.classList.add('has-file');
      document.getElementById('message').className = 'message';
      document.getElementById('message').textContent = '';

      var reader = new FileReader();
      reader.onload = function(e) {
        try {
          var data = JSON.parse(e.target.result);
          processBackup(data);
        } catch (err) {
          showMessage('error', '解析文件失败：' + err.message);
        }
      };
      reader.readAsText(file);
    }

    function processBackup(data) {
      convertedRecords = [];
      skippedCount = 0;

      var sources = [];

      // Collect records from food.meals (actual structure of habit-tracker backup)
      if (data.food && Array.isArray(data.food.meals)) {
        sources = sources.concat(data.food.meals);
      }
      // Also check dailyRecords for compatibility
      if (data.dailyRecords && Array.isArray(data.dailyRecords.records)) {
        sources = sources.concat(data.dailyRecords.records);
      }

      // Convert each record
      sources.forEach(function(src) {
        var record = convertRecord(src);
        if (record) {
          convertedRecords.push(record);
        } else {
          skippedCount++;
        }
      });

      // Skip items with title "运动" and title "拉屎" as instructed
      if (data.items && Array.isArray(data.items)) {
        // These are skipped per requirements - exercise and bowel items
      }

      // Sort by date desc, then time
      convertedRecords.sort(function(a, b) {
        return a.date.localeCompare(b.date) || (a.time || '').localeCompare(b.time || '');
      });

      // Show stats
      var counts = { meal: 0, water: 0, bowel: 0, sleep: 0 };
      convertedRecords.forEach(function(r) {
        if (counts[r.type] !== undefined) counts[r.type]++;
      });

      document.getElementById('countMeal').textContent = counts.meal;
      document.getElementById('countWater').textContent = counts.water;
      document.getElementById('countBowel').textContent = counts.bowel;
      document.getElementById('countSleep').textContent = counts.sleep;
      document.getElementById('totalCount').textContent =
        '共 ' + convertedRecords.length + ' 条记录' + (skippedCount > 0 ? '，跳过 ' + skippedCount + ' 条' : '');

      document.getElementById('statsCard').classList.remove('hidden');

      // Show preview
      var typeIcons = { meal: '🍽️', water: '💧', bowel: '🚽', sleep: '😴' };
      var typeLabels = { meal: '饮食', water: '饮水', bowel: '排泄', sleep: '睡眠' };
      var mealTypeLabels = { breakfast: '早餐', lunch: '午餐', dinner: '晚餐' };
      var bowelLabels = { normal: '正常', loose: '偏稀', constipation: '便秘' };

      var previewHtml = '';
      var previewItems = convertedRecords.slice(0, 50);
      if (previewItems.length === 0) {
        previewHtml = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">没有可导入的记录</div></div>';
      } else {
        previewItems.forEach(function(r) {
          var parts = r.date.split('-');
          var dateLabel = parseInt(parts[1]) + '月' + parseInt(parts[2]) + '日';
          previewHtml += '<div class="preview-item">';
          previewHtml += '<div class="preview-icon">' + (typeIcons[r.type] || '❓') + '</div>';
          previewHtml += '<div class="preview-content">';
          previewHtml += '<div class="preview-date">' + dateLabel + ' ' + (r.time || '') + '</div>';
          var desc = typeLabels[r.type] || '';
          if (r.type === 'meal') {
            desc += ' ' + (mealTypeLabels[r.mealType] || '') + ' ' + (r.content || '').substring(0, 30);
          } else if (r.type === 'water') {
            desc += ' ' + (r.amount || 0) + 'ml';
          } else if (r.type === 'bowel') {
            desc += ' ' + (bowelLabels[r.bowelType] || '') + ' ' + (r.note || '');
          } else if (r.type === 'sleep') {
            desc += ' ' + (r.bedtime || '') + '~' + (r.waketime || '');
            if (r.duration) desc += ' ' + r.duration.toFixed(1) + 'h';
          }
          previewHtml += '<div>' + desc + '</div>';
          previewHtml += '</div></div>';
        });
      }
      document.getElementById('previewList').innerHTML = previewHtml;
      document.getElementById('previewCard').classList.remove('hidden');

      // Show import button
      if (convertedRecords.length > 0) {
        document.getElementById('importBtn').classList.remove('hidden');
      } else {
        document.getElementById('importBtn').classList.add('hidden');
      }
    }

    function convertRecord(src) {
      var category = src.category;
      if (!category) return null;

      var base = {
        id: src.id || Date.now(),
        date: src.date || '',
        time: src.time || '',
        createdAt: src.id ? Date.now() : undefined
      };

      if (category === 'meal') {
        base.type = 'meal';
        base.mealType = src.mealType || 'lunch';
        if (base.mealType === 'snack') base.mealType = 'dinner'; // map snack to dinner
        base.cooked = mapCooked(src.selfCooked);
        base.rating = src.rating || 0;
        base.content = src.content || '';
        base.note = src.note || '';
        base.amount = 0;
        base.bowelType = 'normal';
        base.bedtime = '';
        base.waketime = '';
        base.duration = 0;
        return base;
      }

      if (category === 'coffee') {
        // Treat coffee/tea as water record
        base.type = 'water';
        base.amount = src.amount || 250; // default 250ml per cup
        base.note = (src.content || src.note || '咖啡/茶').trim();
        base.content = '';
        base.rating = 0;
        base.cooked = 'no';
        base.mealType = 'lunch';
        base.bowelType = 'normal';
        base.bedtime = '';
        base.waketime = '';
        base.duration = 0;
        return base;
      }

      if (category === 'water') {
        base.type = 'water';
        base.amount = src.amount || 0;
        base.note = src.note || '';
        base.content = '';
        base.rating = 0;
        base.cooked = 'no';
        base.mealType = 'lunch';
        base.bowelType = 'normal';
        base.bedtime = '';
        base.waketime = '';
        base.duration = 0;
        return base;
      }

      if (category === 'sleep') {
        base.type = 'sleep';
        base.bedtime = src.bedTime || src.bedtime || '';
        base.waketime = src.wakeTime || src.waketime || '';
        base.rating = src.quality || 0;
        base.duration = calcDuration(base.bedtime, base.waketime);
        base.content = '';
        base.note = src.note || '';
        base.amount = 0;
        base.cooked = 'no';
        base.mealType = 'lunch';
        base.bowelType = 'normal';
        return base;
      }

      if (category === 'bowel') {
        base.type = 'bowel';
        var note = src.note || '';
        base.bowelType = detectBowelType(note);
        base.note = note;
        base.content = '';
        base.rating = 0;
        base.amount = 0;
        base.cooked = 'no';
        base.mealType = 'lunch';
        base.bedtime = '';
        base.waketime = '';
        base.duration = 0;
        return base;
      }

      return null;
    }

    function mapCooked(val) {
      if (val === 'self') return 'yes';
      if (val === 'outside') return 'no';
      if (val === 'mixed') return 'half';
      return 'no';
    }

    function detectBowelType(note) {
      if (!note) return 'normal';
      if (note.indexOf('稀') !== -1 || note.indexOf('拉稀') !== -1) return 'loose';
      if (note.indexOf('便秘') !== -1 || note.indexOf('困难') !== -1) return 'constipation';
      return 'normal';
    }

    function calcDuration(bedtime, waketime) {
      if (!bedtime || !waketime) return 0;
      try {
        var bp = bedtime.split(':');
        var wp = waketime.split(':');
        var bedMin = parseInt(bp[0]) * 60 + parseInt(bp[1]);
        var wakeMin = parseInt(wp[0]) * 60 + parseInt(wp[1]);
        var diff = wakeMin - bedMin;
        if (diff < 0) diff += 24 * 60; // overnight
        return diff / 60;
      } catch (e) {
        return 0;
      }
    }

    function doImport() {
      if (convertedRecords.length === 0) {
        showMessage('error', '没有可导入的记录');
        return;
      }

      // Load existing health data
      var existing = {};
      try {
        var raw = localStorage.getItem('health_manager');
        if (raw) existing = JSON.parse(raw);
      } catch (e) {}

      // Merge: keep existing records, add new ones
      if (!existing.records) existing.records = [];
      if (!existing.nextId) existing.nextId = 1;

      // Find max existing id
      var maxId = existing.nextId;
      existing.records.forEach(function(r) {
        if (r.id >= maxId) maxId = r.id + 1;
      });

      // Assign new IDs to avoid conflicts
      var importCount = 0;
      convertedRecords.forEach(function(r) {
        // Check if record with same date+time+type already exists
        var dup = existing.records.some(function(er) {
          return er.date === r.date && er.time === r.time && er.type === r.type;
        });
        if (!dup) {
          r.id = maxId++;
          r.createdAt = Date.now();
          existing.records.push(r);
          importCount++;
        }
      });

      existing.nextId = maxId;

      // Save
      try {
        localStorage.setItem('health_manager', JSON.stringify(existing));
        showMessage('success',
          '导入成功！共导入 ' + importCount + ' 条记录，跳过重复 ' + (convertedRecords.length - importCount) + ' 条。<br><br>' +
          '<a href="wardrobe-manager.html">返回主应用</a>'
        );
        document.getElementById('importBtn').disabled = true;
      } catch (err) {
        showMessage('error', '保存失败：' + err.message);
      }
    }

    function showMessage(type, text) {
      var el = document.getElementById('message');
      el.className = 'message ' + type;
      el.innerHTML = text;
    }
  </script>

</body>
</html>
